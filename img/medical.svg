<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'IBM Plex Mono', monospace">
  <defs>
    <linearGradient id="bgM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d33"/><stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <radialGradient id="glowM" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#28e0b0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#28e0b0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgM)"/>
  <rect width="800" height="600" fill="url(#glowM)"/>
  <g stroke="#21344f" stroke-width="1" opacity="0.4">
    <path d="M0 150H800M0 300H800M0 450H800M150 0V600M300 0V600M450 0V600M600 0V600"/>
  </g>

  <!-- monitor de signos -->
  <g transform="translate(400,300)">
    <rect x="-260" y="-150" width="520" height="300" rx="14" fill="#0a1424" stroke="#21344f" stroke-width="2"/>
    <rect x="-240" y="-130" width="480" height="200" rx="6" fill="#0c1830" stroke="#16263f"/>

    <!-- trazo ECG -->
    <path d="M-230 -30 H-150 L-130 -30 L-115 -80 L-100 60 L-85 -30 L-30 -30 L-10 -30 L5 -75 L20 55 L35 -30 L120 -30 L140 -30 L155 -70 L170 50 L185 -30 L240 -30"
          fill="none" stroke="#28e0b0" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- punto activo -->
    <circle cx="240" cy="-30" r="4" fill="#28e0b0"/>

    <!-- lecturas -->
    <g fill="#4ea8ff" font-size="22" font-weight="500">
      <text x="-230" y="120">72</text>
    </g>
    <text x="-230" y="138" fill="#5a6b82" font-size="11" letter-spacing="1">BPM</text>
    <g fill="#28e0b0" font-size="22" font-weight="500">
      <text x="-120" y="120">98%</text>
    </g>
    <text x="-120" y="138" fill="#5a6b82" font-size="11" letter-spacing="1">SpO2</text>

    <!-- checkmark mantenimiento -->
    <g transform="translate(170,110)">
      <circle r="22" fill="#0a1424" stroke="#28e0b0" stroke-width="2"/>
      <path d="M-9 0 L-3 7 L10 -8" fill="none" stroke="#28e0b0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- llave / herramienta -->
  <g transform="translate(150,470) rotate(-30)" stroke="#4ea8ff" stroke-width="2.4" fill="none" opacity="0.8">
    <path d="M0 0 a14 14 0 1 0 14 -14 l-10 10 -6 -6 10 -10 a14 14 0 0 0 -22 6 a14 14 0 0 0 14 20 Z" transform="scale(1.3)"/>
  </g>

  <!-- nodos de estado -->
  <g>
    <circle cx="650" cy="120" r="5" fill="#28e0b0"/>
    <circle cx="690" cy="160" r="3.5" fill="#4ea8ff"/>
    <circle cx="660" cy="190" r="3" fill="#28e0b0" opacity="0.6"/>
    <path d="M650 120 L690 160 L660 190" stroke="#21344f" stroke-width="1" fill="none"/>
  </g>

  <g>
    <rect x="40" y="500" width="250" height="34" rx="4" fill="#0a1424" stroke="#21344f"/>
    <circle cx="60" cy="517" r="4" fill="#28e0b0"/>
    <text x="76" y="522" fill="#93a4bd" font-size="13" letter-spacing="1.5">STATUS · OPERATIVO</text>
  </g>
  <text x="560" y="522" fill="#5a6b82" font-size="12" letter-spacing="2">MANTENIMIENTO</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'IBM Plex Mono', monospace">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d33"/><stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="edgeL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28e0b0"/><stop offset="1" stop-color="#4ea8ff"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#28e0b0" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#28e0b0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgL)"/>
  <rect width="800" height="600" fill="url(#glowL)"/>
  <g stroke="#21344f" stroke-width="1" opacity="0.4">
    <path d="M0 150H800M0 300H800M0 450H800M150 0V600M300 0V600M450 0V600M600 0V600"/>
  </g>

  <!-- edificio isométrico como wireframe + puntos -->
  <g transform="translate(400,310)">
    <!-- cuerpo iso -->
    <g stroke="url(#edgeL)" stroke-width="1.6" fill="none" opacity="0.9">
      <!-- base -->
      <path d="M-150 40 L0 120 L150 40 L0 -40 Z"/>
      <!-- altura -->
      <path d="M-150 40 L-150 -90 L0 -170 L0 -40"/>
      <path d="M0 -40 L0 -170 L150 -90 L150 40"/>
      <path d="M-150 -90 L0 -10 L150 -90"/>
      <path d="M0 -10 L0 120"/>
    </g>
    <!-- segundo volumen -->
    <g stroke="#4ea8ff" stroke-width="1.3" fill="none" opacity="0.6">
      <path d="M40 60 L120 100 L200 60 L120 20 Z"/>
      <path d="M40 60 L40 -10 L120 -50 L120 20"/>
      <path d="M120 20 L120 -50 L200 -10 L200 60"/>
    </g>

    <!-- vértices como puntos LiDAR -->
    <g fill="#28e0b0">
      <circle cx="-150" cy="40" r="4"/><circle cx="0" cy="120" r="4"/><circle cx="150" cy="40" r="4"/><circle cx="0" cy="-40" r="4"/>
      <circle cx="-150" cy="-90" r="4"/><circle cx="0" cy="-170" r="4.5"/><circle cx="150" cy="-90" r="4"/><circle cx="0" cy="-10" r="4"/>
    </g>
    <g fill="#4ea8ff">
      <circle cx="40" cy="60" r="3.2"/><circle cx="120" cy="100" r="3.2"/><circle cx="200" cy="60" r="3.2"/><circle cx="120" cy="20" r="3.2"/><circle cx="40" cy="-10" r="3.2"/><circle cx="120" cy="-50" r="3.2"/><circle cx="200" cy="-10" r="3.2"/>
    </g>
  </g>

  <!-- nube de puntos dispersa de fondo -->
  <g fill="#28e0b0" opacity="0.35">
    <circle cx="120" cy="180" r="2"/><circle cx="660" cy="160" r="2"/><circle cx="700" cy="420" r="2"/><circle cx="110" cy="460" r="2"/><circle cx="640" cy="470" r="2"/><circle cx="90" cy="300" r="2"/><circle cx="710" cy="300" r="2"/><circle cx="180" cy="120" r="1.6"/><circle cx="610" cy="120" r="1.6"/>
  </g>

  <!-- HUD esquinas -->
  <g stroke="#28e0b0" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M40 40 H70 M40 40 V70"/>
    <path d="M760 40 H730 M760 40 V70"/>
    <path d="M40 560 H70 M40 560 V530"/>
    <path d="M760 560 H730 M760 560 V530"/>
  </g>
  <g>
    <rect x="40" y="500" width="230" height="34" rx="4" fill="#0a1424" stroke="#21344f"/>
    <circle cx="60" cy="517" r="4" fill="#28e0b0"/>
    <text x="76" y="522" fill="#93a4bd" font-size="13" letter-spacing="1.5">POINT CLOUD · ±5MM</text>
  </g>
  <text x="560" y="522" fill="#5a6b82" font-size="12" letter-spacing="2">MAPEO 3D</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'IBM Plex Mono', monospace">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d33"/><stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1ba888"/><stop offset="1" stop-color="#28e0b0"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.55" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#28e0b0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#28e0b0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgC)"/>
  <rect width="800" height="600" fill="url(#glowC)"/>
  <g stroke="#21344f" stroke-width="1" opacity="0.4">
    <path d="M0 150H800M0 300H800M0 450H800M150 0V600M300 0V600M450 0V600M600 0V600"/>
  </g>

  <!-- panel de análisis -->
  <g transform="translate(110,120)">
    <!-- ejes -->
    <path d="M0 0 V340 H560" stroke="#21344f" stroke-width="2" fill="none"/>
    <g stroke="#16263f" stroke-width="1">
      <path d="M0 85 H560 M0 170 H560 M0 255 H560"/>
    </g>

    <!-- barras -->
    <g>
      <rect x="50"  y="200" width="54" height="140" rx="3" fill="url(#barC)" opacity="0.85"/>
      <rect x="150" y="140" width="54" height="200" rx="3" fill="url(#barC)" opacity="0.9"/>
      <rect x="250" y="90"  width="54" height="250" rx="3" fill="url(#barC)"/>
      <rect x="350" y="160" width="54" height="180" rx="3" fill="#16263f" stroke="#4ea8ff" stroke-width="1.5"/>
      <rect x="450" y="60"  width="54" height="280" rx="3" fill="#16263f" stroke="#4ea8ff" stroke-width="1.5"/>
    </g>

    <!-- línea de tendencia -->
    <path d="M77 215 L177 150 L277 100 L377 165 L477 70"
          fill="none" stroke="#4ea8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#0a1424" stroke="#4ea8ff" stroke-width="2">
      <circle cx="77" cy="215" r="5"/><circle cx="177" cy="150" r="5"/><circle cx="277" cy="100" r="5"/><circle cx="377" cy="165" r="5"/><circle cx="477" cy="70" r="5"/>
    </g>
  </g>

  <!-- nodos de decisión (diagrama) arriba derecha -->
  <g transform="translate(600,90)" opacity="0.85">
    <circle cx="0" cy="0" r="16" fill="#0a1424" stroke="#28e0b0" stroke-width="2"/>
    <path d="M0 16 V46" stroke="#21344f" stroke-width="1.5"/>
    <path d="M0 46 H-40 M0 46 H40" stroke="#21344f" stroke-width="1.5"/>
    <path d="M-40 46 V70 M40 46 V70" stroke="#21344f" stroke-width="1.5"/>
    <rect x="-54" y="70" width="28" height="20" rx="3" fill="#16263f" stroke="#4ea8ff" stroke-width="1.2"/>
    <rect x="26" y="70" width="28" height="20" rx="3" fill="#16263f" stroke="#28e0b0" stroke-width="1.2"/>
    <path d="M-6 -4 L-1 3 L7 -8" fill="none" stroke="#28e0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <rect x="40" y="510" width="240" height="34" rx="4" fill="#0a1424" stroke="#21344f"/>
    <circle cx="60" cy="527" r="4" fill="#28e0b0"/>
    <text x="76" y="532" fill="#93a4bd" font-size="13" letter-spacing="1.5">ANÁLISIS · VIABILIDAD</text>
  </g>
  <text x="580" y="532" fill="#5a6b82" font-size="12" letter-spacing="2">CONSULTORÍA</text>
</svg>

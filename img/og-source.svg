<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d33"/><stop offset="1" stop-color="#0a1424"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#28e0b0"/><stop offset="1" stop-color="#4ea8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#28e0b0" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#28e0b0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- retícula -->
  <g stroke="#21344f" stroke-width="1" opacity="0.3">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630"/>
  </g>

  <!-- nube de puntos derecha -->

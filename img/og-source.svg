    </g>
    <g opacity="0.65" fill="#4ea8ff">
      <circle cx="820" cy="368" r="3.4"/><circle cx="880" cy="362" r="3.4"/><circle cx="940" cy="372" r="3.6"/><circle cx="1000" cy="364" r="3.4"/><circle cx="1060" cy="374" r="3.8"/><circle cx="1120" cy="366" r="3.4"/>
    </g>
    <g opacity="0.5">
      <circle cx="840" cy="322" r="2.8"/><circle cx="900" cy="318" r="2.8"/><circle cx="960" cy="326" r="3"/><circle cx="1020" cy="320" r="2.8"/><circle cx="1080" cy="328" r="3"/>
    </g>
    <g opacity="0.36" fill="#4ea8ff">
      <circle cx="860" cy="284" r="2.2"/><circle cx="920" cy="281" r="2.2"/><circle cx="980" cy="286" r="2.4"/><circle cx="1040" cy="282" r="2.2"/><circle cx="1100" cy="288" r="2.4"/>
    </g>
    <g opacity="0.24">
      <circle cx="880" cy="252" r="1.8"/><circle cx="940" cy="250" r="1.8"/><circle cx="1000" cy="254" r="1.9"/><circle cx="1060" cy="251" r="1.8"/>
    </g>
  </g>
  <rect x="760" y="343" width="420" height="2" fill="url(#grad)" opacity="0.7"/>

  <!-- logo -->
  <g transform="translate(90,80)">
    <rect width="56" height="56" rx="11" fill="#0a1424" stroke="#21344f"/>
    <g transform="translate(28,28)">
      <circle r="15" fill="none" stroke="#28e0b0" stroke-width="2" opacity="0.4"/>
      <circle r="9" fill="none" stroke="#28e0b0" stroke-width="2" opacity="0.7"/>
      <circle cx="0" cy="-15" r="2.6" fill="#28e0b0"/><circle cx="15" cy="0" r="2.6" fill="#28e0b0"/><circle cx="0" cy="15" r="2.6" fill="#28e0b0"/><circle cx="-15" cy="0" r="2.6" fill="#28e0b0"/>
      <circle r="3.6" fill="#4ea8ff"/>
    </g>
    <text x="74" y="26" fill="#e8eef7" font-size="30" font-weight="700" letter-spacing="-1">PDM</text>
    <text x="140" y="26" fill="#28e0b0" font-size="30" font-weight="700" letter-spacing="-1">4Cero</text>
    <text x="74" y="48" fill="#93a4bd" font-size="13" letter-spacing="3" font-family="monospace">TECNOLOGÍA DE PRECISIÓN</text>

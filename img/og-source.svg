    <text x="110" y="518" fill="#e8eef7" font-size="16">Cobertura nacional · Oficinas en la Ciudad de México</text>
    <text x="110" y="540" fill="#5a6b82" font-size="14">Distribuidores Emesent en México</text>
  </g>
